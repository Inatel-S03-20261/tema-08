; PlatformIO Project Configuration File
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; `pio run` / `pio run -t upload` SEM -e usam so o esp32dev.
; O ambiente `native` (testes da logica no PC) so roda com `pio test -e native`.
default_envs = esp32dev

[env]
; -I src permite includes por caminho a partir da raiz de src
build_flags = -I src

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; --- Bibliotecas graficas/SD (so no firmware, nao no native) ---
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bodmer/JPEGDecoder@^2.0.0
    https://github.com/bitbank2/PNGdec.git
    knolleary/PubSubClient@^2.8

; --- Config do TFT_eSPI por build_flags (portavel; nao edita a lib) ---
; Display ILI9341 240x320 (rotation 1 -> 320x240 paisagem), barramento VSPI.
; O cartao SD compartilha o MOSI/MISO/SCLK com CS proprio (SD_CS=5 em sd_card.h).
build_flags =
    ${env.build_flags}
    -D USER_SETUP_LOADED=1
    -D ILI9341_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=19
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=4
    -D TFT_BL=-1
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=27000000
    -D SPI_READ_FREQUENCY=20000000

[env:native]
platform = native
; gnu++11 (em vez de 17) para compilar tambem em compiladores host antigos
build_flags = -I src -std=gnu++11
test_build_src = yes
build_src_filter = +<*> -<main.cpp> -<infra/> -<app/>
